# =============================================================================
# Anomaly Detection Engine — Configuration
# All thresholds live here. Never hardcode in source files.
# Sensitive values (webhook URL, DB password) come from environment variables.
# =============================================================================

# --- Nginx log path (inside the shared Docker volume) ---
log:
  path: /var/log/nginx/hng-access.log

# --- Sliding window sizes ---
windows:
  short_window_seconds: 60

# --- Rolling baseline ---
baseline:
  rolling_window_minutes: 30
  recalc_interval_seconds: 60
  min_samples: 30
  floor_mean: 1.0
  floor_stddev: 0.5

# --- Anomaly detection thresholds ---
detection:
  zscore_threshold: 3.0
  rate_multiplier: 5.0
  error_surge_multiplier: 3.0
  error_tighten_factor: 0.7

# --- Blocking / banning ---
blocking:
  ban_durations_seconds:
    - 600      # 10 minutes
    - 1800     # 30 minutes
    - 7200     # 2 hours
    - -1       # permanent
  unban_check_interval_seconds: 30

# --- Slack ---
# webhook_url is NOT stored here — it is read from the SLACK_WEBHOOK_URL
# environment variable at runtime (set in .env, never committed to git).
slack:
  webhook_url: ""          # Placeholder, real value comes from env var
  alert_cooldown_seconds: 60

# --- Dashboard ---
dashboard:
  host: "0.0.0.0"
  port: 8080
  refresh_interval_ms: 3000

# --- Database ---
# URL is read from DATABASE_URL env var first, this is just the fallback.
database:
  url: "postgresql://nextcloud:changeme_db@db:5432/nextcloud"

# --- Audit log ---
audit:
  path: /var/log/detector/audit.log

# --- Logging level ---
log_level: INFO