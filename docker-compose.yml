# =============================================================================
# HNG Nextcloud + Anomaly Detection Stack
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Database — PostgreSQL
  # ---------------------------------------------------------------------------
  db:
    image: postgres:15-alpine
    container_name: hng-db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       nextcloud
      POSTGRES_USER:     nextcloud
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_db}
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nextcloud"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Nextcloud
  # ---------------------------------------------------------------------------
  nextcloud:
    image: nextcloud:28-apache
    container_name: hng-nextcloud
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST:     db
      POSTGRES_DB:       nextcloud
      POSTGRES_USER:     nextcloud
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_db}
      NEXTCLOUD_ADMIN_USER:      ${NC_ADMIN_USER:-admin}
      NEXTCLOUD_ADMIN_PASSWORD:  ${NC_ADMIN_PASS:-changeme_admin}
      NEXTCLOUD_TRUSTED_DOMAINS: ${SERVER_IP:-localhost} nginx
      OVERWRITEPROTOCOL: http
    volumes:
      - nextcloud-data:/var/www/html
      - HNG-nginx-logs:/var/log/nginx:ro
    networks:
      - internal
      - external
    expose:
      - "80"

  # ---------------------------------------------------------------------------
  # Nginx reverse proxy
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.25-alpine
    container_name: hng-nginx
    restart: unless-stopped
    depends_on:
      - nextcloud
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - HNG-nginx-logs:/var/log/nginx
    networks:
      - internal
      - external

  # ---------------------------------------------------------------------------
  # Anomaly detection daemon
  # ---------------------------------------------------------------------------
  detector:
    build:
      context: ./detector
      dockerfile: Dockerfile
    container_name: hng-detector
    restart: unless-stopped
    depends_on:
      - nginx
      - db
    cap_add:
      - NET_ADMIN
    user: root
    volumes:
      - HNG-nginx-logs:/var/log/nginx:ro
      - detector-logs:/var/log/detector
      - ./detector/config.yaml:/app/config.yaml:ro
    ports:
      - "8080:8080"
    environment:
      # These come from your .env file — never hardcoded here
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL}
      DATABASE_URL:      postgresql://nextcloud:${POSTGRES_PASSWORD:-changeme_db}@db:5432/nextcloud
    networks:
      - internal
      - external

# =============================================================================
# Volumes
# =============================================================================
volumes:
  HNG-nginx-logs:
    name: HNG-nginx-logs
  nextcloud-data:
  db-data:
  detector-logs:

# =============================================================================
# Networks
# =============================================================================
networks:
  internal:
    driver: bridge
    internal: true
  external:
    driver: bridge