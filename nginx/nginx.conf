# nginx/nginx.conf
# =============================================================================
# Nginx reverse proxy for Nextcloud + JSON access log for the detector.
#
# Key design decisions:
#   1. JSON log format — lets the daemon parse with json.loads() instead of regex
#   2. X-Forwarded-For trust — we trust the IP Nginx sees (docker network)
#      and forward it to Nextcloud so it logs the real client IP too
#   3. Named volume — Nginx writes to /var/log/nginx/hng-access.log which
#      is inside the HNG-nginx-logs Docker volume; the detector mounts it R/O
# =============================================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # -------------------------------------------------------------------------
    # JSON access log format
    # The detector's _parse_line() expects exactly these field names.
    # -------------------------------------------------------------------------
    log_format json_access escape=json
        '{'
            '"source_ip":"$remote_addr",'
            '"timestamp":"$time_iso8601",'
            '"method":"$request_method",'
            '"path":"$request_uri",'
            '"status":$status,'
            '"response_size":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"http_host":"$host",'
            '"user_agent":"$http_user_agent",'
            '"x_forwarded_for":"$http_x_forwarded_for"'
        '}';

    # Write to the shared volume path
    access_log /var/log/nginx/hng-access.log json_access;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    server_tokens off;  # don't reveal Nginx version

    # -------------------------------------------------------------------------
    # Real IP handling
    # We tell Nginx to trust the Docker internal network so X-Forwarded-For
    # is set to the actual client IP, not the Docker gateway.
    # -------------------------------------------------------------------------
    # Docker's default bridge network range
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 192.168.0.0/16;
    real_ip_header   X-Forwarded-For;
    real_ip_recursive on;

    # -------------------------------------------------------------------------
    # Upstream: Nextcloud container
    # -------------------------------------------------------------------------
    upstream nextcloud {
        server nextcloud:80;
        keepalive 32;
    }

    # -------------------------------------------------------------------------
    # Main server block — HTTP (redirect to HTTPS in production)
    # -------------------------------------------------------------------------
    server {
        listen 80;
        server_name _;

        # Large body for file uploads (Nextcloud needs this)
        client_max_body_size 10G;
        client_body_timeout 300s;
        client_body_buffer_size 512k;

        # Security headers
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy no-referrer always;

        # Forward real IP to Nextcloud
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Proxy timeouts (generous for large file uploads)
        proxy_connect_timeout 60s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;
        proxy_buffering       off;
        proxy_request_buffering off;

        location / {
            proxy_pass http://nextcloud;
        }

        # CalDAV / CardDAV redirects (Nextcloud requirement)
        location = /.well-known/carddav {
            return 301 $scheme://$host/remote.php/dav;
        }
        location = /.well-known/caldav {
            return 301 $scheme://$host/remote.php/dav;
        }
    }
}